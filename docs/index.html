<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f7f5">
  <meta name="description" content="Terpedia Cyc is a source-linked encyclopedia of terpenes and biochemical knowledge.">
  <title>Cyc | Terpedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=PT+Serif:wght@400;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme:light; --app:#f7f7f5; --side:#f0f1ed; --paper:#fffdf7; --paper-deep:#f5f0e5; --ink:#29201a; --muted:#6f675f; --faint:#948c84; --line:#ddd9d0; --green:#2f9250; --green-dark:#246e3d; --green-soft:#e5f1e7; --gold:#bd9b40; --shadow:0 18px 48px rgba(49,40,31,.12); }
    * { box-sizing:border-box; }
    html,body { height:100%; }
    body { margin:0; overflow:hidden; background:var(--app); color:var(--muted); font:16px "PT Serif",Georgia,serif; letter-spacing:0; }
    button,input { font:inherit; }
    button { color:inherit; }
    a { color:inherit; }
    .app-header { position:relative; z-index:30; display:grid; height:68px; grid-template-columns:270px minmax(260px,760px) auto; align-items:center; gap:22px; border-bottom:1px solid var(--line); background:#fbfbfa; padding:0 22px; }
    .brand { display:flex; min-width:0; align-items:center; gap:11px; color:var(--ink); text-decoration:none; }
    .brand-mark { display:grid; width:34px; height:42px; place-items:center; color:var(--gold); }
    .brand-mark svg { width:25px; }
    .brand-name { font:500 21px "Playfair Display",Georgia,serif; white-space:nowrap; }
    .brand-name span { color:var(--green); }
    .search { display:grid; height:42px; grid-template-columns:auto 1fr auto; align-items:center; border:1px solid #d5d3cc; border-radius:7px; background:#fff; box-shadow:0 1px 3px rgba(40,32,24,.04); }
    .search svg { width:17px; margin-left:14px; color:var(--faint); }
    .search input { min-width:0; height:40px; border:0; outline:0; background:transparent; color:var(--ink); padding:0 11px; font-size:16px; }
    .search button { height:32px; border:0; border-left:1px solid var(--line); background:transparent; color:var(--green-dark); padding:0 14px; cursor:pointer; font:600 10px Montserrat,sans-serif; letter-spacing:1px; text-transform:uppercase; }
    .header-actions { display:flex; justify-content:flex-end; gap:5px; }
    .icon-button { display:grid; width:38px; height:38px; place-items:center; border:0; border-radius:6px; background:transparent; cursor:pointer; }
    .icon-button:hover { background:var(--green-soft); color:var(--green-dark); }
    .icon-button svg { width:19px; }
    .app { display:grid; height:calc(100% - 68px); grid-template-columns:270px minmax(0,1fr); transition:grid-template-columns .18s ease; }
    .app.sidebar-collapsed { grid-template-columns:0 minmax(0,1fr); }
    .history { min-width:0; overflow:hidden; border-right:1px solid var(--line); background:var(--side); }
    .history-inner { display:flex; width:270px; height:100%; flex-direction:column; padding:16px 12px; }
    .history-head { display:flex; align-items:center; justify-content:space-between; padding:0 5px 11px 10px; }
    .history-head h2 { margin:0; color:var(--faint); font:600 10px Montserrat,sans-serif; letter-spacing:1.5px; text-transform:uppercase; }
    .history-list { overflow:auto; margin:0; padding:0; list-style:none; }
    .history-list a { display:grid; grid-template-columns:auto minmax(0,1fr); align-items:center; gap:9px; border-radius:6px; padding:9px 10px; color:var(--muted); text-decoration:none; }
    .history-list a:hover,.history-list a.active { background:#fff; color:var(--ink); }
    .history-list svg { width:15px; color:var(--faint); }
    .history-list span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .history-empty { padding:10px; color:var(--faint); font-size:14px; }
    .history-foot { margin-top:auto; border-top:1px solid var(--line); padding:12px 10px 2px; }
    .history-foot a { color:var(--green-dark); font:600 10px Montserrat,sans-serif; letter-spacing:1px; text-decoration:none; text-transform:uppercase; }
    .workspace { position:relative; min-width:0; overflow:hidden; padding:15px 22px 10px; }
    .workspace-head { display:flex; height:38px; align-items:center; justify-content:space-between; gap:20px; }
    .entry-context { min-width:0; overflow:hidden; color:var(--faint); font:500 10px Montserrat,sans-serif; letter-spacing:1.2px; text-overflow:ellipsis; text-transform:uppercase; white-space:nowrap; }
    .entry-context strong { color:var(--green-dark); font-weight:600; }
    .load-state { color:var(--faint); font-size:13px; }
    .load-state.error { color:#9f3f35; }
    .book-shell { position:relative; height:calc(100% - 38px); min-height:0; overflow:hidden; }
    .book-mount,.book { width:100%; height:calc(100% - 48px); margin:auto; }
    .book-mount .book { height:100%; }
    .book-page { position:relative; overflow:hidden; border:1px solid #d3ccbe; background:var(--paper); color:var(--muted); box-shadow:inset 0 0 32px rgba(68,53,36,.035); }
    .book-page-inner { height:100%; overflow:hidden; padding:36px 38px 44px; }
    .book-page h1,.book-page h2,.book-page h3 { margin:0; color:var(--ink); font-family:"Playfair Display",Georgia,serif; font-weight:500; }
    .book-page h2 { margin-bottom:15px; font-size:23px; line-height:1.18; }
    .book-page h3 { margin-bottom:7px; font-size:16px; }
    .page-number { position:absolute; right:24px; bottom:16px; color:var(--faint); font:10px Montserrat,sans-serif; }
    .book-cover { display:flex; height:100%; align-items:center; justify-content:center; background:var(--paper-deep); text-align:center; }
    .book-cover svg { width:44px; color:var(--gold); }
    .book-cover h1 { margin:14px 0 10px; font-size:42px; }
    .book-cover p { max-width:310px; margin:0 auto; line-height:1.55; }
    .eyebrow { margin:0 0 10px; color:var(--green); font:600 10px Montserrat,sans-serif; letter-spacing:2px; text-transform:uppercase; }
    .entry-title { font-size:clamp(28px,3vw,38px); line-height:1.08; overflow-wrap:anywhere; }
    .aliases { margin:11px 0 18px; color:var(--faint); font-size:13px; font-style:italic; line-height:1.42; }
    .aliases strong { color:var(--muted); font-family:Montserrat,sans-serif; font-size:8px; font-style:normal; letter-spacing:.8px; text-transform:uppercase; }
    .summary { font-size:15px; line-height:1.52; }
    .summary a,.entry-copy a { color:var(--green-dark); font-weight:700; text-decoration-color:#9ac5a5; text-underline-offset:3px; }
    .organism-link { position:relative; }
    .organism-link::after { position:absolute; z-index:40; bottom:calc(100% + 7px); left:50%; width:max-content; max-width:220px; border:1px solid var(--line); border-radius:5px; background:var(--ink); color:#fff; content:attr(data-common-name); opacity:0; padding:6px 8px; pointer-events:none; transform:translate(-50%,4px); transition:opacity .12s ease,transform .12s ease; font:500 10px Montserrat,sans-serif; line-height:1.35; text-align:center; }
    .organism-link:hover::after,.organism-link:focus::after { opacity:1; transform:translate(-50%,0); }
    .identity { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:0 18px; margin-top:18px; border-top:1px solid var(--line); }
    .identity div { min-width:0; border-bottom:1px solid var(--line); padding:7px 0; }
    .identity dt { color:var(--faint); font:600 8px Montserrat,sans-serif; letter-spacing:1px; text-transform:uppercase; }
    .identity dd { overflow:hidden; margin:3px 0 0; color:var(--ink); font-size:11px; text-overflow:ellipsis; white-space:nowrap; }
    .index-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 20px; }
    .index-grid a { display:flex; min-width:0; align-items:baseline; justify-content:space-between; gap:8px; border-bottom:1px solid #e9e3d8; padding:7px 0; color:var(--ink); text-decoration:none; }
    .index-grid a:hover { color:var(--green); }
    .index-grid span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .index-grid small { flex:none; color:var(--faint); font:8px Montserrat,sans-serif; text-transform:uppercase; }
    .relationship-list { margin:0; padding:0; list-style:none; }
    .relationship-list li { display:grid; grid-template-columns:minmax(0,.8fr) minmax(0,1.1fr); gap:12px; border-bottom:1px solid #e9e3d8; padding:8px 0; font-size:12.5px; line-height:1.35; }
    .relationship-list a { color:var(--green-dark); font-weight:700; text-decoration:none; }
    .relationship-list em { display:block; color:var(--faint); font-size:10.5px; font-weight:400; }
    .measure { color:var(--ink); }
    .relationship-map { position:relative; display:grid; min-height:420px; grid-template-columns:1fr 1fr; align-content:center; gap:15px 60px; }
    .relationship-map::before { position:absolute; top:50%; left:50%; width:1px; height:70%; background:var(--line); content:""; transform:translate(-50%,-50%); }
    .map-center { position:absolute; z-index:2; top:50%; left:50%; width:138px; border:2px solid var(--green); border-radius:50%; background:var(--paper); color:var(--ink); padding:28px 12px; transform:translate(-50%,-50%); text-align:center; }
    .map-node { position:relative; min-width:0; border-bottom:1px solid var(--line); padding:10px 8px; color:var(--ink); text-decoration:none; }
    .map-node:nth-child(even) { text-align:right; }
    .map-node small { display:block; color:var(--green-dark); font:8px Montserrat,sans-serif; letter-spacing:.6px; text-transform:uppercase; }
    .science-figure { display:flex; height:430px; flex-direction:column; align-items:center; justify-content:center; margin:0; }
    .science-figure canvas,.science-figure img { width:min(100%,390px); height:330px; object-fit:contain; }
    .science-figure figcaption { max-width:390px; margin-top:8px; color:var(--faint); font-size:10.5px; line-height:1.4; text-align:center; }
    .science-figure figcaption a { color:var(--green-dark); }
    .protein-chart { display:flex; height:350px; align-items:flex-end; gap:8px; border-bottom:1px solid var(--ink); padding:20px 8px 0; }
    .protein-bar { display:flex; min-width:0; flex:1; flex-direction:column; align-items:center; justify-content:flex-end; gap:7px; color:var(--faint); font:8px Montserrat,sans-serif; }
    .protein-bar i { display:block; width:100%; min-height:3px; background:var(--green); }
    .protein-bar strong { color:var(--ink); font-size:9px; }
    .sources { margin:0; padding:0; list-style:none; }
    .sources li { border-bottom:1px solid var(--line); padding:10px 0; font-size:14px; line-height:1.35; }
    .sources a { color:var(--green-dark); overflow-wrap:anywhere; }
    .book-controls { position:absolute; right:8px; bottom:4px; left:8px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; }
    .book-controls div { display:flex; justify-content:center; gap:5px; }
    .book-controls button { display:grid; width:36px; height:34px; place-items:center; border:1px solid var(--line); border-radius:6px; background:#fff; cursor:pointer; }
    .book-controls button:hover { border-color:var(--green); color:var(--green-dark); }
    .book-controls button:disabled { opacity:.35; }
    .book-controls svg { width:17px; }
    .page-count { color:var(--faint); font:10px Montserrat,sans-serif; letter-spacing:1px; text-align:center; text-transform:uppercase; }
    .book-provenance { justify-self:end; color:var(--faint); font-size:11px; }
    .stf__parent { margin:auto; }
    @media (max-width:820px) {
      .app-header { grid-template-columns:auto minmax(0,1fr) auto; padding:0 12px; }
      .brand-name { display:none; }
      .app { grid-template-columns:0 minmax(0,1fr); }
      .app.sidebar-open { grid-template-columns:270px minmax(0,1fr); }
      .history { position:absolute; z-index:25; top:68px; bottom:0; left:0; width:270px; transform:translateX(-100%); transition:transform .18s ease; }
      .app.sidebar-open .history { transform:translateX(0); box-shadow:12px 0 30px rgba(35,29,23,.15); }
      .workspace { padding:10px 10px 8px; }
      .workspace-head { height:32px; }
      .book-shell { height:calc(100% - 32px); }
      .book-page-inner { padding:27px 23px 40px; }
      .book-controls { bottom:0; }
      .book-provenance { display:none; }
    }
    @media (max-width:520px) {
      .app-header { height:62px; gap:8px; }
      .app { height:calc(100% - 62px); }
      .history { top:62px; }
      .search button { width:38px; overflow:hidden; padding:0; color:transparent; }
      .search button::after { color:var(--green-dark); content:"Go"; font-size:9px; }
      .book-page-inner { padding:24px 20px 38px; }
      .index-grid { grid-template-columns:1fr; }
      .relationship-map { gap:10px 35px; }
      .map-center { width:110px; padding:22px 8px; font-size:13px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/" aria-label="Terpedia Cyc index"><span class="brand-mark"><svg viewBox="0 0 32 42" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M16 39V12M16 17C9 16 5 11 5 5c7 0 11 4 11 12ZM16 12c6-1 10-5 10-11-6 0-10 4-10 11ZM16 26c-6 0-10-3-12-8 6-1 11 2 12 8ZM16 31c5 0 9-3 12-8-6-1-11 2-12 8Z"/></svg></span><span class="brand-name">Terpedia <span>Cyc</span></span></a>
    <form class="search" id="search"><i data-lucide="search" aria-hidden="true"></i><input id="keyword" type="search" autocomplete="off" placeholder="Search entries, molecules, proteins..." aria-label="Search Cyc"><button type="submit">Search</button></form>
    <div class="header-actions"><button class="icon-button" id="toggle-sidebar" type="button" aria-label="Toggle recent entries" title="Recent entries"><i data-lucide="panel-left"></i></button><a class="icon-button" href="https://terpedia.com" aria-label="Terpedia home" title="Terpedia home"><i data-lucide="house"></i></a></div>
  </header>
  <div class="app" id="app">
    <aside class="history" aria-label="Previous entries"><div class="history-inner"><div class="history-head"><h2>Previous terms</h2><button class="icon-button" id="close-sidebar" type="button" aria-label="Collapse recent entries"><i data-lucide="panel-left-close"></i></button></div><ul class="history-list" id="history-list"></ul><div class="history-foot"><a href="/">Entry index</a></div></div></aside>
    <main class="workspace">
      <div class="workspace-head"><div class="entry-context" id="entry-context">Terpedia knowledge graph</div><div class="load-state" id="load-state"></div></div>
      <div class="book-shell"><div class="book-mount" id="book-mount"><div class="book" id="book"></div></div><div class="book-controls"><span class="page-count" id="page-count"></span><div><button id="previous-page" type="button" aria-label="Previous page" title="Previous page"><i data-lucide="chevron-left"></i></button><button id="next-page" type="button" aria-label="Next page" title="Next page"><i data-lucide="chevron-right"></i></button></div><span class="book-provenance">Source-linked KB</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script src="https://unpkg.com/smiles-drawer@2.1.7/dist/smiles-drawer.min.js"></script>
  <script>
    const API_BASE='https://terpedia-knowledge-715567218723.us-central1.run.app';
    const app=document.querySelector('#app');
    let book=document.querySelector('#book');
    const search=document.querySelector('#search');
    const keyword=document.querySelector('#keyword');
    const pageCount=document.querySelector('#page-count');
    const previousPage=document.querySelector('#previous-page');
    const nextPage=document.querySelector('#next-page');
    const loadState=document.querySelector('#load-state');
    const entryContext=document.querySelector('#entry-context');
    const historyList=document.querySelector('#history-list');
    const pages=[];
    const pageMeta=[];
    const entryStarts=new Map();
    const entryCache=new Map();
    let index=[];
    let linkTerms=[];
    let flip=null;
    let currentPage=0;
    let navigationTarget=null;
    let navigationTimer=null;
    let recent=JSON.parse(localStorage.getItem('terpedia-cyc-recent') || '[]');

    const escapeHtml=value=>String(value ?? '').replace(/[&<>"']/g,character=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[character]);
    const escapePattern=value=>String(value).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const entryUrl=entry=>`/?q=${encodeURIComponent(entry.id || entry.label)}`;
    const normalize=value=>String(value || '').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
    const TYPE_LABELS={assay_context:'assay context',biological_process:'biological process',biological_target:'biological target',cell_line:'cell line',essential_oil_compound:'essential-oil compound',terokit_enzyme:'TeroKit enzyme',terokit_molecule:'TeroKit molecule',terokit_reaction:'TeroKit reaction',wikidata_entity:'knowledge entity'};
    const PREDICATE_LABELS={catalyzed_by:'Catalyzed by',found_in_taxon:'Recorded in',has_part:'Contains',instance_of:'Classified as',measured_activity_in:'Activity measured in',measured_activity_in_cell_line:'Activity measured in cell line',measured_admet_property:'ADMET measurement',part_of:'Part of',produces:'Produces',same_as:'Same record as',subclass_of:'Type of',substrate_of:'Substrate in',taxon_common_name:'Common name'};
    const IDENTIFIER_LABELS={cas:'CAS Registry Number',chembl:'ChEMBL',formula:'Molecular formula',inchi:'InChI',inchiKey:'InChIKey',inchikey:'InChIKey',length:'Sequence length',molecularFormula:'Molecular formula',pubchem:'PubChem CID',pubchemCid:'PubChem CID',terokit:'TeroKit',uniprot:'UniProt',wikidata:'Wikidata'};
    const humanType=value=>TYPE_LABELS[value] || String(value || 'knowledge entity').replaceAll('_',' ');
    const humanPredicate=value=>PREDICATE_LABELS[value] || String(value || 'Related to').replaceAll('_',' ').replace(/^./,character=>character.toUpperCase());
    const displayLabelFor=entry=>/^Q\d+$/i.test(entry?.label || '') ? commonNameFor(entry) || entry?.wikimedia?.wikipedia?.title || entry.label : entry?.label || entry?.id;
    const chunk=(rows,size)=>Array.from({length:Math.ceil(rows.length/size)},(_,offset)=>rows.slice(offset*size,(offset+1)*size));
    function proseChunks(value,firstLimit=360,nextLimit=820) {
      const text=String(value || '').replace(/\s+/g,' ').trim();
      const rows=[]; let remaining=text; let limit=firstLimit;
      while(remaining.length>limit) {
        const sentence=remaining.lastIndexOf('. ',limit);
        const clause=remaining.lastIndexOf('; ',limit);
        const word=remaining.lastIndexOf(' ',limit);
        const split=sentence>=limit*.55 ? sentence : clause>=limit*.65 ? clause : word>=limit*.7 ? word : limit;
        rows.push(remaining.slice(0,split+1).trim()); remaining=remaining.slice(split+1).trim(); limit=nextLimit;
      }
      if(remaining) rows.push(remaining);
      return rows;
    }
    function page(html,meta={}) { const number=pages.length+1; pages.push(`<section class="book-page"><div class="book-page-inner">${html}<span class="page-number">${number}</span></div></section>`); pageMeta.push(meta); }
    function addTerms(rows) {
      const byId=new Map(index.map(item=>[item.id,item]));
      for (const row of rows || []) if(row?.id && row?.label) byId.set(row.id,{...byId.get(row.id),...row});
      index=[...byId.values()];
      const seen=new Set();
      linkTerms=index.flatMap(entry=>[entry.label,...(entry.aliases || [])].map(term=>({term,entry}))).filter(item=>item.term?.length>2 && !seen.has(normalize(item.term)) && seen.add(normalize(item.term))).sort((a,b)=>b.term.length-a.term.length);
    }
    const commonNameFor=entry=>(entry?.commonNames || entry?.wikimedia?.commonNames || [])[0] || '';
    const organismLike=(entry,predicate='')=>/organism|taxon|species|plant|fung|bacter|animal/i.test(`${entry?.type || ''} ${entry?.description || ''}`) || predicate==='found_in_taxon';
    function organismAttributes(entry,predicate='') {
      if(!entry?.id || !organismLike(entry,predicate)) return '';
      return ` class="organism-link" data-organism-id="${escapeHtml(entry.id)}" data-common-name="${escapeHtml(commonNameFor(entry) || 'Looking up common name…')}"`;
    }
    function linkify(value,currentId='') {
      const text=String(value || '');
      if(!text || !linkTerms.length) return escapeHtml(text);
      const matches=[];
      for(const item of linkTerms) {
        if(item.entry.id===currentId) continue;
        const expression=new RegExp(`\\b${escapePattern(item.term).replace(/\\\s+/g,'[\\s-]+')}\\b`,'gi');
        for(const match of text.matchAll(expression)) matches.push({start:match.index,end:match.index+match[0].length,text:match[0],entry:item.entry});
      }
      matches.sort((a,b)=>a.start-b.start || b.end-a.end);
      let cursor=0,end=-1,html='';
      for(const match of matches) if(match.start>=end) { html+=escapeHtml(text.slice(cursor,match.start))+`<a href="${entryUrl(match.entry)}"${organismAttributes(match.entry)}>${escapeHtml(match.text)}</a>`; cursor=match.end; end=match.end; }
      return html+escapeHtml(text.slice(cursor));
    }
    function renderRecent(activeId='') {
      historyList.innerHTML=recent.length ? recent.map(item=>`<li><a href="${entryUrl(item)}" class="${item.id===activeId?'active':''}"><i data-lucide="book-open"></i><span>${escapeHtml(item.label)}</span></a></li>`).join('') : '<li class="history-empty">Entries you open appear here.</li>';
      lucide.createIcons();
    }
    function remember(entry) {
      recent=[{id:entry.id,label:entry.label},...recent.filter(item=>item.id!==entry.id)].slice(0,30);
      localStorage.setItem('terpedia-cyc-recent',JSON.stringify(recent));
      renderRecent(entry.id);
    }
    function identityRows(entry) {
      const values={...(entry.identifiers || {}),...(entry.molecularFormula && {formula:entry.molecularFormula}),...(entry.sequenceLength && {length:`${entry.sequenceLength} aa`})};
      return Object.entries(values).filter(([,value])=>value && typeof value!=='object').slice(0,8).map(([label,value])=>`<div><dt>${escapeHtml(IDENTIFIER_LABELS[label] || label.replaceAll('_',' '))}</dt><dd title="${escapeHtml(value)}">${escapeHtml(value)}</dd></div>`).join('');
    }
    function qualifier(statement) {
      const q=statement.qualifiers || {};
      return [q.standardType,q.value!==undefined?`${q.relation || ''}${q.value}`:null,q.units].filter(Boolean).join(' ');
    }
    function targetFor(statement,entry) {
      const targetId=statement.subjectId===entry.id ? statement.objectEntityId : statement.subjectId;
      const targetLabel=statement.subjectId===entry.id ? (statement.objectLabel || statement.value) : statement.subjectLabel;
      return {id:targetId,label:targetLabel || targetId || statement.value || 'Recorded value'};
    }
    function moleculeImage(entry) {
      const ids=entry.identifiers || {};
      const cid=ids.pubchemCid || ids.pubchem || (entry.id.startsWith('pubchem:') ? entry.id.split(':')[1] : '');
      const key=ids.inchiKey || ids.inchikey;
      if(cid) return `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${encodeURIComponent(cid)}/PNG?image_size=large`;
      if(key) return `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/inchikey/${encodeURIComponent(key)}/PNG?image_size=large`;
      return '';
    }
    function addEntryPages(payload) {
      const entry=payload.entry;
      addTerms(payload.entities || [entry]);
      const start=pages.length;
      const displayLabel=displayLabelFor(entry);
      const description=payload.encyclopedia?.content?.overview || entry.encyclopediaSummary || entry.description || 'This entity is indexed in the Terpedia knowledge graph.';
      const overviewPages=proseChunks(description);
      const classification=(payload.statements || []).find(row=>row.subjectId===entry.id && ['instance_of','subclass_of'].includes(row.predicate))?.objectLabel;
      const typeLabel=humanType(entry.type==='wikidata_entity' && classification ? classification : entry.type);
      const aliases=(entry.aliases || []).filter(alias=>normalize(alias)!==normalize(displayLabel)).slice(0,5);
      page(`<p class="eyebrow">${escapeHtml(typeLabel)}</p><h1 class="entry-title">${escapeHtml(displayLabel)}</h1>${aliases.length?`<p class="aliases"><strong>Also known as</strong><br>${aliases.map(escapeHtml).join(', ')}</p>`:''}<div class="summary entry-copy">${linkify(overviewPages[0],entry.id)}</div>${identityRows(entry)?`<dl class="identity">${identityRows(entry)}</dl>`:''}`,{entryId:entry.id,label:displayLabel,kind:'entry'});
      for(const copy of overviewPages.slice(1)) page(`<p class="eyebrow">Encyclopedia entry</p><h2>Overview continued</h2><div class="summary entry-copy">${linkify(copy,entry.id)}</div>`,{entryId:entry.id,label:displayLabel,kind:'overview'});
      const smiles=entry.smiles || entry.identifiers?.smiles;
      const image=moleculeImage(entry);
      const wikiImage=entry.wikimedia?.wikipedia?.image;
      if(smiles || image || wikiImage) {
        const isMolecule=Boolean(smiles || image);
        const isOrganism=!isMolecule && (organismLike(entry) || /species of|plant|organism|taxon/i.test(description));
        const visualLabel=isMolecule?'Molecular structure':isOrganism?'Organism profile':'Reference image';
        const visual=smiles ? `<canvas data-smiles="${escapeHtml(smiles)}" data-fallback-src="${escapeHtml(image || wikiImage)}" data-fallback-alt="${escapeHtml(displayLabel)} molecular structure" aria-label="2D molecular structure of ${escapeHtml(displayLabel)}"></canvas>` : `<img src="${escapeHtml(image || wikiImage)}" alt="${escapeHtml(displayLabel)} sourced reference" loading="eager">`;
        const caption=smiles || image ? `2D structure from the indexed chemical identity${entry.identifiers?.pubchemCid?` · <a href="https://pubchem.ncbi.nlm.nih.gov/compound/${escapeHtml(entry.identifiers.pubchemCid)}" target="_blank" rel="noopener">PubChem ${escapeHtml(entry.identifiers.pubchemCid)}</a>`:''}` : `<a href="${escapeHtml(entry.wikimedia.wikipedia.url)}" target="_blank" rel="noopener">Sourced photograph from Wikimedia Commons</a>`;
        page(`<p class="eyebrow">${visualLabel}</p><h2>${escapeHtml(displayLabel)}</h2><figure class="science-figure">${visual}<figcaption>${caption}</figcaption></figure>`,{entryId:entry.id,label:displayLabel,kind:'visual'});
      }
      if(entry.sequenceLength && Object.keys(entry.aminoAcidComposition || {}).length) {
        const composition=Object.entries(entry.aminoAcidComposition).sort((a,b)=>b[1]-a[1]).slice(0,12);
        const max=Math.max(...composition.map(([,count])=>count));
        page(`<p class="eyebrow">Protein record</p><h2>Amino-acid composition</h2><div class="protein-chart">${composition.map(([residue,count])=>`<span class="protein-bar"><strong>${escapeHtml(count)}</strong><i style="height:${Math.max(3,Math.round(count/max*280))}px"></i><span>${escapeHtml(residue)}</span></span>`).join('')}</div><p>${escapeHtml(entry.sequenceLength)} residues in the indexed TeroKit sequence.</p>`,{entryId:entry.id,label:displayLabel,kind:'protein'});
      }
      const statements=payload.statements || [];
      if(statements.length) {
        const visualStatements=statements.filter(row=>row.objectEntityId || row.subjectId).slice(0,8);
        if(visualStatements.length) page(`<p class="eyebrow">Semantic graph</p><h2>Connected knowledge</h2><div class="relationship-map"><div class="map-center">${escapeHtml(displayLabel)}</div>${visualStatements.map(row=>{const target=targetFor(row,entry);const targetEntity=(payload.entities || []).find(item=>item.id===target.id) || target;return `<a class="map-node${organismLike(targetEntity,row.predicate)?' organism-link':''}" href="${target.id?`/?q=${encodeURIComponent(target.id)}`:'#'}"${organismLike(targetEntity,row.predicate)?` data-organism-id="${escapeHtml(target.id)}" data-common-name="${escapeHtml(commonNameFor(targetEntity) || 'Looking up common name…')}"`:''}><small>${escapeHtml(humanPredicate(row.predicate))}${qualifier(row)?` · ${escapeHtml(qualifier(row))}`:''}</small>${escapeHtml(displayLabelFor(targetEntity))}</a>`;}).join('')}</div>`,{entryId:entry.id,label:displayLabel,kind:'graph'});
        for(const rows of chunk(statements,7)) page(`<p class="eyebrow">Verified relationships</p><h2>Knowledge statements</h2><ul class="relationship-list">${rows.map(row=>{const target=targetFor(row,entry);const targetEntity=(payload.entities || []).find(item=>item.id===target.id) || target;return `<li><span><em>${escapeHtml(humanPredicate(row.predicate))}</em>${qualifier(row)?`<span class="measure">${escapeHtml(qualifier(row))}</span>`:''}</span><span>${target.id?`<a href="/?q=${encodeURIComponent(target.id)}"${organismAttributes(targetEntity,row.predicate)}>${escapeHtml(displayLabelFor(targetEntity))}</a>`:escapeHtml(target.label)}${row.qualifiers?.assayDescription?`<em>${escapeHtml(row.qualifiers.assayDescription)}</em>`:''}</span></li>`;}).join('')}</ul>`,{entryId:entry.id,label:displayLabel,kind:'statements'});
      }
      const connected=(payload.entities || []).filter(item=>item.id!==entry.id).slice(0,28);
      if(connected.length) page(`<p class="eyebrow">Cross references</p><h2>Connected entries</h2><div class="index-grid">${connected.map(item=>`<a href="${entryUrl(item)}"${organismAttributes(item)}><span>${escapeHtml(displayLabelFor(item))}</span><small>${escapeHtml(humanType(item.type))}</small></a>`).join('')}</div>`,{entryId:entry.id,label:displayLabel,kind:'related'});
      const sources=[...(payload.citations || [])];
      if(entry.wikimedia?.wikidataUrl) sources.unshift({title:`Wikidata ${entry.wikimedia.wikidataId}`,url:entry.wikimedia.wikidataUrl});
      if(entry.wikimedia?.wikipedia?.url) sources.unshift({title:`Wikipedia: ${entry.wikimedia.wikipedia.title}`,url:entry.wikimedia.wikipedia.url});
      for(const rows of chunk(sources,8)) page(`<p class="eyebrow">Provenance</p><h2>Sources</h2><ul class="sources">${rows.map(source=>`<li>${source.url?`<a href="${escapeHtml(source.url)}" target="_blank" rel="noopener">${escapeHtml(source.title || source.publisher || source.datasetId || source.doi || 'Source record')}</a>`:escapeHtml(source.title || source.datasetId || 'Terpedia KB source')}${source.license?`<br><small>${escapeHtml(source.license)}</small>`:''}</li>`).join('')}</ul>`,{entryId:entry.id,label:entry.label,kind:'sources'});
      entryStarts.set(entry.id,start);
      entryStarts.set(normalize(entry.label),start);
      for(const alias of entry.aliases || []) entryStarts.set(normalize(alias),start);
      entryCache.set(entry.id,payload);
      return start;
    }
    function updatePageState(pageIndex) {
      currentPage=pageIndex;
      pageCount.textContent=`Page ${pageIndex+1} of ${pages.length}`;
      previousPage.disabled=pageIndex<=0;
      nextPage.disabled=pageIndex>=pages.length-1;
      const meta=pageMeta[pageIndex] || {};
      entryContext.innerHTML=meta.entryId?`Terpedia Cyc / <strong>${escapeHtml(meta.label)}</strong> / ${escapeHtml(meta.kind || 'entry')}`:'Terpedia knowledge graph / entry index';
      renderRecent(meta.entryId || '');
      if(navigationTarget!==null) {
        window.clearTimeout(navigationTimer);
        if(pageIndex===navigationTarget) navigationTarget=null;
        else navigationTimer=window.setTimeout(stepTowardTarget,320);
      }
    }
    function hydrateGraphics() {
      document.querySelectorAll('canvas[data-smiles]').forEach(canvas=>{
        if(canvas.dataset.rendered || !window.SmilesDrawer) return;
        canvas.dataset.rendered='true';
        SmilesDrawer.parse(canvas.dataset.smiles,tree=>new SmilesDrawer.Drawer({width:390,height:330,padding:22,bondThickness:1.3,fontSizeLarge:9,fontSizeSmall:6}).draw(tree,canvas,'light',false),()=>{
          const fallback=canvas.dataset.fallbackSrc;
          if(fallback) { const image=document.createElement('img'); image.src=fallback; image.alt=canvas.dataset.fallbackAlt; canvas.replaceWith(image); }
          else canvas.replaceWith(Object.assign(document.createElement('p'),{textContent:'No structure rendering is available for this record.'}));
        });
      });
    }
    function rebuildBook(target=currentPage) {
      const start=Math.min(currentPage,Math.max(0,pages.length-1));
      if(flip) { flip.destroy(); flip=null; }
      const replacement=document.createElement('div');
      replacement.className='book'; replacement.id='book';
      document.querySelector('#book-mount').replaceChildren(replacement);
      book=replacement;
      book.innerHTML=pages.join('');
      if(!window.St?.PageFlip) { updatePageState(target); hydrateGraphics(); return; }
      flip=new St.PageFlip(book,{width:475,height:650,size:'stretch',minWidth:255,maxWidth:510,minHeight:430,maxHeight:720,flippingTime:260,maxShadowOpacity:.18,showCover:true,mobileScrollSupport:false,usePortrait:true,autoSize:true});
      flip.loadFromHTML(book.querySelectorAll('.book-page'));
      flip.on('flip',event=>updatePageState(event.data));
      flip.turnToPage(start);
      updatePageState(start);
      hydrateGraphics();
      window.setTimeout(()=>goToPage(target),120);
    }
    function stepTowardTarget() {
      if(navigationTarget===null || !flip) return;
      const direction=navigationTarget>flip.getCurrentPageIndex()?1:-1;
      direction>0?flip.flipNext():flip.flipPrev();
    }
    function goToPage(target) {
      target=Math.max(0,Math.min(target,pages.length-1));
      if(!flip) { updatePageState(target); return; }
      const distance=target-flip.getCurrentPageIndex();
      if(!distance) { updatePageState(target); return; }
      window.clearTimeout(navigationTimer);
      navigationTarget=target;
      if(Math.abs(distance)>5) flip.turnToPage(target-Math.sign(distance)*5);
      navigationTimer=window.setTimeout(stepTowardTarget,90);
    }
    async function openEntry(query,{push=true}={}) {
      const key=entryStarts.has(query)?query:normalize(query);
      if(entryStarts.has(key)) {
        const target=entryStarts.get(key);
        const meta=pageMeta[target];
        keyword.value=meta.label;
        if(push) history.pushState({},'',`/?q=${encodeURIComponent(meta.entryId)}`);
        remember({id:meta.entryId,label:meta.label});
        goToPage(target);
        return;
      }
      loadState.className='load-state'; loadState.textContent='Resolving and enriching...';
      try {
        const response=await fetch(`${API_BASE}/v1/cyc/${encodeURIComponent(query)}?depth=1&limit=60&enrich=1`);
        if(response.status===404) throw new Error(`No entry found for “${query}”.`);
        if(!response.ok) throw new Error('The knowledge service is temporarily unavailable.');
        const payload=await response.json();
        const target=entryStarts.get(payload.entry.id) ?? addEntryPages(payload);
        keyword.value=payload.entry.label;
        document.title=`${payload.entry.label} | Terpedia Cyc`;
        if(push) history.pushState({},'',`/?q=${encodeURIComponent(payload.entry.id)}`);
        remember(payload.entry);
        rebuildBook(target);
      } catch(error) { loadState.className='load-state error'; loadState.textContent=error.message; }
      finally { if(!loadState.classList.contains('error')) loadState.textContent=''; }
    }
    function buildIndexPages() {
      page(`<div class="book-cover"><div><svg viewBox="0 0 32 42" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 39V12M16 17C9 16 5 11 5 5c7 0 11 4 11 12ZM16 12c6-1 10-5 10-11-6 0-10 4-10 11ZM16 26c-6 0-10-3-12-8 6-1 11 2 12 8ZM16 31c5 0 9-3 12-8-6-1-11 2-12 8Z"/></svg><p class="eyebrow">Living knowledge graph</p><h1>Terpedia Cyc</h1><p>Source-linked entries for terpenes, molecules, reactions, proteins, and the evidence connecting them.</p></div></div>`,{kind:'cover'});
      for(const [offset,rows] of chunk(index,20).entries()) { const first=displayLabelFor(rows[0])?.[0]?.toUpperCase() || '#'; const last=displayLabelFor(rows[rows.length-1])?.[0]?.toUpperCase() || first; const range=first===last?`${first} entries`:`${first}–${last} entries`; page(`<p class="eyebrow">Entry index · ${offset+1}</p><h2>${escapeHtml(range)}</h2><div class="index-grid">${rows.map(item=>`<a href="${entryUrl(item)}"${organismAttributes(item)}><span>${escapeHtml(displayLabelFor(item))}</span><small>${escapeHtml(humanType(item.type))}</small></a>`).join('')}</div>`,{kind:'index'}); }
    }
    async function initialize() {
      lucide.createIcons(); renderRecent();
      const response=await fetch(`${API_BASE}/v1/cyc?limit=120`);
      if(!response.ok) throw new Error('The Cyc index is temporarily unavailable.');
      const payload=await response.json(); addTerms(payload.data || []); buildIndexPages(); rebuildBook(0);
      const query=new URLSearchParams(location.search).get('q');
      if(query) await openEntry(query,{push:false});
    }
    search.addEventListener('submit',event=>{event.preventDefault();const query=keyword.value.trim();if(query)openEntry(query);});
    document.addEventListener('click',event=>{const link=event.target.closest('a[href^="/"]');if(!link)return;event.preventDefault();const url=new URL(link.href);const query=url.searchParams.get('q');if(query)openEntry(query);else{history.pushState({},'',location.pathname);document.title='Cyc | Terpedia';goToPage(0);}});
    document.addEventListener('pointerover',async event=>{
      const link=event.target.closest('a.organism-link[data-organism-id]');
      if(!link || link.dataset.commonName!=='Looking up common name…' || link.dataset.commonNameLoading) return;
      link.dataset.commonNameLoading='true';
      try {
        const response=await fetch(`${API_BASE}/v1/cyc/${encodeURIComponent(link.dataset.organismId)}?depth=1&limit=12&enrich=1`);
        if(!response.ok) throw new Error('lookup failed');
        const payload=await response.json();
        link.dataset.commonName=commonNameFor(payload.entry) || 'No common name recorded';
      } catch(error) { link.dataset.commonName='No common name recorded'; }
    });
    previousPage.addEventListener('click',()=>flip?.flipPrev()); nextPage.addEventListener('click',()=>flip?.flipNext());
    document.querySelector('#toggle-sidebar').addEventListener('click',()=>{if(matchMedia('(max-width:820px)').matches)app.classList.toggle('sidebar-open');else app.classList.toggle('sidebar-collapsed');});
    document.querySelector('#close-sidebar').addEventListener('click',()=>{app.classList.remove('sidebar-open');app.classList.add('sidebar-collapsed');});
    window.addEventListener('popstate',()=>{const query=new URLSearchParams(location.search).get('q');query?openEntry(query,{push:false}):goToPage(0);});
    initialize().catch(error=>{loadState.className='load-state error';loadState.textContent=error.message;});
  </script>
</body>
</html>
